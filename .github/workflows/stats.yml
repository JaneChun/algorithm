name: Update Solved Stats

on:
  schedule:
    - cron: "0 2 * * 0"   # 매주 일요일 11:00 KST — 스터디 후 갱신
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate stats into README
        run: python scripts/gen_stats.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- README.md; then
            echo "변경 없음 — 커밋 스킵"
          else
            git add README.md
            git commit -m "chore: update solved stats [skip ci]"
            git push
          fi
